<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menstrual Health Awareness Game</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/game.js" defer></script>
</head>
<body data-theme="light">
  <!-- Top Navigation -->
  <nav class="app-navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar-content">
      <button class="nav-btn nav-back" id="back-btn" aria-label="Go back to previous page">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        <span>Back</span>
      </button>
      
      <div class="navbar-title">
        <h1>Menstrual Health Awareness</h1>
      </div>

      <div class="navbar-controls">
        <button class="icon-btn" id="rules-btn" aria-label="Show game rules" title="Rules" data-tooltip="Rules">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 7v14"></path>
            <path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"></path>
          </svg>
        </button>
        <button class="icon-btn" id="theme-btn" aria-label="Toggle theme" title="Theme" data-tooltip="Theme">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
          </svg>
        </button>
        <button class="icon-btn" id="music-btn" aria-label="Toggle music" title="Music" data-tooltip="Music">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
          </svg>
        </button>
        <button class="icon-btn" id="sound-btn" aria-label="Toggle sound effects" title="Sound effects" data-tooltip="Sound">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M11 5 6 9H2v6h4l5 4z"></path>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          </svg>
        </button>
        <button class="icon-btn" id="read-aloud-btn" aria-label="Toggle read aloud" title="Read aloud" data-tooltip="Read aloud">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 6v12"></path>
            <path d="M8 9v6"></path>
            <path d="M16 9v6"></path>
            <path d="M4 11v2"></path>
            <path d="M20 11v2"></path>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Game Container -->
  <div class="app-container">
    <!-- Game Board Section -->
    <section class="game-section" aria-label="Game play area">
      <div class="board-wrapper">
        <div class="game-board" aria-label="Snakes and ladders board">
          <img 
            src="assets/images/menstrual-maze-board.png" 
            alt="Menstrual Maze Cycle of Knowledge game board" 
            id="board-img"
            class="board-image"
          >
          <img 
            id="player1" 
            class="player-token player-token-1" 
            src="assets/images/player11.png" 
            alt="Player 1 token"
          >
          <img 
            id="player2" 
            class="player-token player-token-2" 
            src="assets/images/player22.png" 
            alt="Player 2 token"
          >
          <img
            id="player3"
            class="player-token player-token-3"
            src="assets/images/player11.png"
            alt="Player 3 token"
            hidden
          >
          <img
            id="player4"
            class="player-token player-token-4"
            src="assets/images/player22.png"
            alt="Player 4 token"
            hidden
          >
        </div>
      </div>
      
      <div class="game-controls">
        <div class="control-panel">
          <div class="current-player-info">
            <span class="label">Current Turn</span>
            <span id="current-player-name" class="player-name">Player 1</span>
          </div>
          
          <div class="dice-display">
            <div class="dice-row">
              <div id="dice-cube" class="dice-cube dice-face-1" role="img" aria-label="Dice showing 1">
                <div class="dice-face-panel dice-panel-1" aria-hidden="true">
                  <span class="pip pip-center"></span>
                </div>
                <div class="dice-face-panel dice-panel-2" aria-hidden="true">
                  <span class="pip pip-top-left"></span>
                  <span class="pip pip-bottom-right"></span>
                </div>
                <div class="dice-face-panel dice-panel-3" aria-hidden="true">
                  <span class="pip pip-top-left"></span>
                  <span class="pip pip-center"></span>
                  <span class="pip pip-bottom-right"></span>
                </div>
                <div class="dice-face-panel dice-panel-4" aria-hidden="true">
                  <span class="pip pip-top-left"></span>
                  <span class="pip pip-top-right"></span>
                  <span class="pip pip-bottom-left"></span>
                  <span class="pip pip-bottom-right"></span>
                </div>
                <div class="dice-face-panel dice-panel-5" aria-hidden="true">
                  <span class="pip pip-top-left"></span>
                  <span class="pip pip-top-right"></span>
                  <span class="pip pip-center"></span>
                  <span class="pip pip-bottom-left"></span>
                  <span class="pip pip-bottom-right"></span>
                </div>
                <div class="dice-face-panel dice-panel-6" aria-hidden="true">
                  <span class="pip pip-top-left"></span>
                  <span class="pip pip-top-right"></span>
                  <span class="pip pip-middle-left"></span>
                  <span class="pip pip-middle-right"></span>
                  <span class="pip pip-bottom-left"></span>
                  <span class="pip pip-bottom-right"></span>
                </div>
              </div>
              <div id="dice-value-display" class="dice-value">
                <span class="rolled-label">Rolled</span>
                <span class="rolled-number">1</span>
              </div>
            </div>
            <button id="roll-dice" class="btn btn-primary btn-lg" disabled>Roll Dice</button>
          </div>
          
          <button id="restart" class="btn btn-secondary btn-sm">Restart Game</button>
        </div>
      </div>
    </section>

    <section class="player-section" aria-label="Player information">
      <div class="player-cards-container">
        <article class="player-card player-card-1">
          <div class="player-avatar-wrapper">
            <img id="player1-card-avatar" src="assets/images/player11.png" alt="" class="player-avatar">
          </div>
          <div class="player-card-info">
            <span class="player-label">Player 1</span>
            <span id="player1-name-display" class="player-name">Player 1</span>
          </div>
        </article>

        <article class="player-card player-card-2">
          <div class="player-avatar-wrapper">
            <img id="player2-card-avatar" src="assets/images/player22.png" alt="" class="player-avatar">
          </div>
          <div class="player-card-info">
            <span class="player-label">Player 2</span>
            <span id="player2-name-display" class="player-name">Player 2</span>
          </div>
        </article>

        <article class="player-card player-card-3" hidden>
          <div class="player-avatar-wrapper">
            <img id="player3-card-avatar" src="assets/images/player11.png" alt="" class="player-avatar">
          </div>
          <div class="player-card-info">
            <span class="player-label">Player 3</span>
            <span id="player3-name-display" class="player-name">Player 3</span>
          </div>
        </article>

        <article class="player-card player-card-4" hidden>
          <div class="player-avatar-wrapper">
            <img id="player4-card-avatar" src="assets/images/player22.png" alt="" class="player-avatar">
          </div>
          <div class="player-card-info">
            <span class="player-label">Player 4</span>
            <span id="player4-name-display" class="player-name">Player 4</span>
          </div>
        </article>
      </div>
    </section>
  </div>

  <!-- Game Setup Modal (Carousel Rules + Player Names) -->
  <div id="setup-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="setup-title">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="setup-title" class="modal-title">Game Rules</h2>
        <button class="modal-close" id="close-setup" aria-label="Close setup modal" hidden>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <!-- Rules Carousel -->
        <div class="rules-carousel" id="rules-carousel">
          <div class="carousel-controls">
            <button class="carousel-btn carousel-skip" id="skip-rules" aria-label="Skip rules">
              <span>Skip</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8.59 16.34l4.58-4.59-4.58-4.59L10 5.75l6 6-6 6-.41-.41zM4 6h2v12H4z"/>
              </svg>
            </button>
          </div>

          <div class="carousel-slides" id="carousel-slides">
            <!-- Slides will be generated by JS -->
          </div>

          <div class="carousel-indicators" id="carousel-indicators">
            <!-- Indicators will be generated by JS -->
          </div>

          <div class="carousel-navigation">
            <button class="carousel-btn carousel-prev" id="carousel-prev" aria-label="Previous rule">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
              <span>Back</span>
            </button>
            <button class="carousel-btn carousel-next" id="carousel-next" aria-label="Next rule">
              <span>Next</span>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>
          </div>

          <div class="carousel-options">
            <label class="checkbox-wrapper">
              <input type="checkbox" id="dont-show-again" aria-label="Don't show rules again">
              <span class="checkbox-label">Don't show again</span>
            </label>
          </div>
        </div>

        <!-- Player Setup Form -->
        <div class="player-setup" id="player-setup" hidden>
          <h3>Configure Players</h3>
          <div class="player-count-section">
            <label for="player-count">Number of Players:</label>
            <select id="player-count">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </div>
          <div class="player-inputs">
            <!-- Player 3 -->
            <div class="input-group" id="player3-input-group" hidden>
              <label for="player3-name">Player 3 Name</label>
              <input type="text" id="player3-name" placeholder="Enter name" value="Player 3" maxlength="20" />
              <div class="avatar-selection" id="player3-avatar-selection" aria-label="Select avatar for Player 3">
                <span class="avatar-label">Choose avatar:</span>
                <div class="avatar-options">
                  <button type="button" class="avatar-option selected" data-avatar="assets/images/player11.png" aria-label="3D masked blond avatar"> <img src="assets/images/player11.png" alt="3D masked blond avatar"/></button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/player22.png" aria-label="3D masked red-haired avatar"> <img src="assets/images/player22.png" alt="3D masked red-haired avatar"/></button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-male-1.svg" aria-label="Male avatar 1"> <img src="assets/images/avatar-male-1.svg" alt="Male avatar 1"/></button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-male-2.svg" aria-label="Male avatar 2"> <img src="assets/images/avatar-male-2.svg" alt="Male avatar 2"/></button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-female-1.svg" aria-label="Female avatar 1"> <img src="assets/images/avatar-female-1.svg" alt="Female avatar 1"/></button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-female-2.svg" aria-label="Female avatar 2"> <img src="assets/images/avatar-female-2.svg" alt="Female avatar 2"/></button>
                </div>
              </div>
              <label class="checkbox-wrapper"><input type="checkbox" class="ai-toggle" data-player="3" /> AI</label>
            </div>
            <!-- Player 4 -->
            <div class="input-group" id="player4-input-group" hidden>
              <label for="player4-name">Player 4 Name</label>
              <input type="text" id="player4-name" placeholder="Enter name" value="Player 4" maxlength="20" />
              <div class="avatar-selection" id="player4-avatar-selection" aria-label="Select avatar for Player 4">
                <span class="avatar-label">Choose avatar:</span>
                <div class="avatar-options">
                  <button type="button" class="avatar-option" data-avatar="assets/images/player11.png" aria-label="3D masked blond avatar"> <img src="assets/images/player11.png" alt="3D masked blond avatar"/></button>
                  <button type="button" class="avatar-option selected" data-avatar="assets/images/player22.png" aria-label="3D masked red-haired avatar"> <img src="assets/images/player22.png" alt="3D masked red-haired avatar"/></button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-male-1.svg" aria-label="Male avatar 1"> <img src="assets/images/avatar-male-1.svg" alt="Male avatar 1"/></button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-male-2.svg" aria-label="Male avatar 2"> <img src="assets/images/avatar-male-2.svg" alt="Male avatar 2"/></button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-female-1.svg" aria-label="Female avatar 1"> <img src="assets/images/avatar-female-1.svg" alt="Female avatar 1"/></button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-female-2.svg" aria-label="Female avatar 2"> <img src="assets/images/avatar-female-2.svg" alt="Female avatar 2"/></button>
                </div>
              </div>
              <label class="checkbox-wrapper"><input type="checkbox" class="ai-toggle" data-player="4" /> AI</label>
            </div>
            <!-- Player 1 -->
            <div class="input-group">
              <label for="player1-name">Player 1 Name</label>
              <input type="text" id="player1-name" placeholder="Enter name" value="Player 1" maxlength="20" />
              <div class="avatar-selection" id="player1-avatar-selection" aria-label="Select avatar for Player 1">
                <span class="avatar-label">Choose avatar:</span>
                <div class="avatar-options">
                  <button type="button" class="avatar-option selected" data-avatar="assets/images/player11.png" aria-label="3D masked blond avatar"> 
                    <img src="assets/images/player11.png" alt="3D masked blond avatar"/>
                  </button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/player22.png" aria-label="3D masked red-haired avatar"> 
                    <img src="assets/images/player22.png" alt="3D masked red-haired avatar"/>
                  </button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-male-1.svg" aria-label="Male avatar 1"> 
                    <img src="assets/images/avatar-male-1.svg" alt="Male avatar 1"/>
                  </button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-male-2.svg" aria-label="Male avatar 2"> 
                    <img src="assets/images/avatar-male-2.svg" alt="Male avatar 2"/>
                  </button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-female-1.svg" aria-label="Female avatar 1"> 
                    <img src="assets/images/avatar-female-1.svg" alt="Female avatar 1"/>
                  </button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-female-2.svg" aria-label="Female avatar 2"> 
                    <img src="assets/images/avatar-female-2.svg" alt="Female avatar 2"/>
                  </button>
                </div>
              </div>
              <label class="checkbox-wrapper"><input type="checkbox" class="ai-toggle" data-player="1" /> AI</label>
            </div>
            <!-- Player 2 -->
            <div class="input-group">
              <label for="player2-name">Player 2 Name</label>
              <input type="text" id="player2-name" placeholder="Enter name" value="Player 2" maxlength="20" />
              <div class="avatar-selection" id="player2-avatar-selection" aria-label="Select avatar for Player 2">
                <span class="avatar-label">Choose avatar:</span>
                <div class="avatar-options">
                  <button type="button" class="avatar-option" data-avatar="assets/images/player11.png" aria-label="3D masked blond avatar"> 
                    <img src="assets/images/player11.png" alt="3D masked blond avatar"/>
                  </button>
                  <button type="button" class="avatar-option selected" data-avatar="assets/images/player22.png" aria-label="3D masked red-haired avatar"> 
                    <img src="assets/images/player22.png" alt="3D masked red-haired avatar"/>
                  </button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-male-1.svg" aria-label="Male avatar 1"> 
                    <img src="assets/images/avatar-male-1.svg" alt="Male avatar 1"/>
                  </button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-male-2.svg" aria-label="Male avatar 2"> 
                    <img src="assets/images/avatar-male-2.svg" alt="Male avatar 2"/>
                  </button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-female-1.svg" aria-label="Female avatar 1"> 
                    <img src="assets/images/avatar-female-1.svg" alt="Female avatar 1"/>
                  </button>
                  <button type="button" class="avatar-option" data-avatar="assets/images/avatar-female-2.svg" aria-label="Female avatar 2"> 
                    <img src="assets/images/avatar-female-2.svg" alt="Female avatar 2"/>
                  </button>
                </div>
              </div>
              <label class="checkbox-wrapper"><input type="checkbox" class="ai-toggle" data-player="2" /> AI</label>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button id="start-game" class="btn btn-primary" type="button">Start Game</button>
      </div>
    </div>
  </div>

  <!-- Question Modal -->
  <div id="question-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="question-title" hidden>
    <div class="modal-overlay"></div>
    <div class="modal-content modal-question">
      <div class="modal-header">
        <h2 id="question-title" class="modal-title">Menstrual Health Question</h2>
      </div>

      <div class="modal-body">
        <p id="question-text" class="question-text"></p>
        
        <!-- Question Feedback Section -->
        <div id="question-feedback" class="feedback hidden" aria-live="polite">
          <div class="feedback-status">
            <span id="feedback-icon" class="feedback-icon"></span>
            <span id="feedback-message" class="feedback-message"></span>
          </div>
          <p id="feedback-explanation" class="feedback-explanation"></p>
        </div>
      </div>

      <div class="modal-footer modal-footer-question">
        <div id="mcq-options" class="mcq-options-container hidden"></div>
        <button id="true-btn" class="btn btn-answer btn-true" type="button">
          <span>True</span>
        </button>
        <button id="false-btn" class="btn btn-answer btn-false" type="button">
          <span>False</span>
        </button>
        <button id="continue-btn" class="btn btn-primary hidden" type="button">
          <span>Continue</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Winner Modal -->
  <div id="winner-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="winner-title" hidden>
    <div class="modal-overlay"></div>
    <div class="modal-content modal-winner">
      <div class="modal-body">
        <div class="winner-icon">🎉</div>
        <h2 id="winner-title" class="modal-title">Game Over!</h2>
        <p id="winner-text" class="winner-text"></p>
        <img id="winner-avatar" src="" alt="" class="winner-avatar">
      </div>

      <div class="modal-footer">
        <button id="play-again-btn" class="btn btn-primary" type="button">Play Again</button>
      </div>
    </div>
  </div>

  <!-- Audio Elements -->
  <audio id="background-music" loop></audio>
  <audio id="question-sound" src="assets/audio/question.mp3"></audio>
  <audio id="snake-sound" src="assets/audio/spill.mp3"></audio>
  <audio id="ladder-sound" src="assets/audio/ladder.mp3"></audio>
  <audio id="dice-sound" src="assets/audio/dice.mp3"></audio>
  <audio id="win-sound" src="assets/audio/win.mp3"></audio>
</body>
</html>
